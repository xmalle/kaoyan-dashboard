<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考研倒计时 · 学习答题卡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;800&family=Noto+Serif+SC:wght@600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EFEEE7;
    --paper-card:#FBFAF6;
    --ink:#1F2F3D;
    --ink-light:#5C7385;
    --stamp:#B8472F;
    --stamp-soft:#F1DAD2;
    --border:#DEDACD;
    --bubble-0:#FBFAF6;
    --bubble-1:#D7E3E1;
    --bubble-2:#A9C4C0;
    --bubble-3:#6E9C97;
    --bubble-4:#3E7470;
    --bubble-5:#1B433F;
    --radius:14px;
    --shadow:0 1px 2px rgba(31,47,61,0.06), 0 4px 14px rgba(31,47,61,0.05);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans SC', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{max-width:920px;margin:0 auto;padding:28px 20px 64px;}
  .mono{font-family:'IBM Plex Mono','Noto Sans SC',monospace;}
  .serif{font-family:'Noto Serif SC',serif;}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
  .eyebrow{font-size:13px;letter-spacing:0.12em;color:var(--ink-light);font-weight:500;}
  .eyebrow b{color:var(--stamp);font-weight:700;}
  .icon-btn{
    border:1px solid var(--border);background:var(--paper-card);color:var(--ink-light);
    width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:border-color .15s, color .15s;
  }
  .icon-btn:hover{border-color:var(--ink-light);color:var(--ink);}

  /* ---------- loading / empty ---------- */
  .center-screen{min-height:60vh;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--ink-light);font-size:14px;}

  /* ---------- setup ---------- */
  .setup-card{
    max-width:440px;margin:8vh auto 0;background:var(--paper-card);border:1px solid var(--border);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:36px 32px;text-align:center;
  }
  .setup-card h1{font-family:'Noto Serif SC',serif;font-size:22px;margin:0 0 8px;}
  .setup-card p{color:var(--ink-light);font-size:14px;line-height:1.7;margin:0 0 22px;}
  .field{margin-bottom:16px;text-align:left;}
  .field label{display:block;font-size:13px;color:var(--ink-light);margin-bottom:6px;font-weight:500;}
  .field input[type=date], .field input[type=text], .field input[type=number], .field textarea{
    width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;
    font-family:inherit;font-size:14px;background:#fff;color:var(--ink);
  }
  .field input:focus, .field textarea:focus{outline:2px solid var(--bubble-3);outline-offset:1px;}
  .btn{
    border:none;border-radius:10px;padding:11px 20px;font-family:inherit;font-size:14px;font-weight:600;
    cursor:pointer;transition:transform .08s, opacity .15s;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--ink);color:#fff;}
  .btn-primary:hover{opacity:0.88;}
  .btn-stamp{background:var(--stamp);color:#fff;}
  .btn-stamp:hover{opacity:0.88;}
  .btn-ghost{background:transparent;color:var(--ink-light);border:1px solid var(--border);}
  .btn-ghost:hover{color:var(--ink);border-color:var(--ink-light);}
  .btn-block{width:100%;}
  .btn-sm{padding:6px 12px;font-size:12.5px;}

  /* ---------- hero ---------- */
  .hero{
    background:var(--paper-card);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:26px 28px;display:flex;align-items:center;gap:26px;margin-bottom:18px;
    position:relative;overflow:hidden;
  }
  .hero::after{
    content:"";position:absolute;left:170px;top:14px;bottom:14px;width:0;
    border-left:2px dashed var(--border);
  }
  .hero-digit-wrap{flex:0 0 auto;text-align:center;min-width:150px;}
  .hero-digit{
    font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:74px;line-height:0.85;
    color:var(--stamp);letter-spacing:-0.02em;
  }
  .hero-digit-unit{font-size:15px;color:var(--ink-light);font-weight:500;margin-top:2px;}
  .hero-meta{flex:1;padding-left:18px;}
  .hero-meta-title{font-family:'Noto Serif SC',serif;font-size:17px;font-weight:700;margin:0 0 6px;}
  .hero-meta-sub{font-size:13px;color:var(--ink-light);line-height:1.7;}
  .hero-meta-sub .mono{color:var(--ink);}

  /* ---------- section ---------- */
  .section{
    background:var(--paper-card);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:22px 24px;margin-bottom:18px;
  }
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .section-title{font-family:'Noto Serif SC',serif;font-size:16px;font-weight:700;}
  .section-caption{font-size:12.5px;color:var(--ink-light);margin-top:2px;}

  /* ---------- milestones (timeline) ---------- */
  .milestone-row{display:flex;align-items:center;gap:14px;padding:11px 0;border-top:1px solid var(--border);}
  .milestone-row:first-of-type{border-top:none;}
  .milestone-num{
    flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--paper);
    border:1.5px solid var(--ink-light);display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-light);
  }
  .milestone-row.current .milestone-num{background:var(--stamp);border-color:var(--stamp);color:#fff;}
  .milestone-body{flex:1;min-width:0;}
  .milestone-title-line{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:5px;}
  .milestone-title{font-size:14px;font-weight:600;}
  .milestone-date{font-size:12px;color:var(--ink-light);font-family:'IBM Plex Mono';flex:0 0 auto;}
  .milestone-bar-track{height:6px;border-radius:4px;background:var(--paper);overflow:hidden;}
  .milestone-bar-fill{height:100%;background:var(--bubble-4);border-radius:4px;}
  .row-actions{display:flex;gap:6px;flex:0 0 auto;}
  .text-x{cursor:pointer;color:var(--ink-light);font-size:13px;padding:2px 6px;border-radius:6px;}
  .text-x:hover{color:var(--stamp);background:var(--stamp-soft);}
  .empty-hint{font-size:13px;color:var(--ink-light);padding:14px 0;text-align:center;}

  /* ---------- key dates ---------- */
  .keydate-list{display:flex;flex-wrap:wrap;gap:10px;}
  .keydate-chip{
    border:1px solid var(--border);border-radius:10px;padding:9px 13px;display:flex;align-items:center;gap:9px;
    background:var(--paper);min-width:150px;
  }
  .keydate-chip.urgent{background:var(--stamp-soft);border-color:var(--stamp);}
  .keydate-chip.past{opacity:0.5;}
  .keydate-chip-title{font-size:13px;font-weight:600;}
  .keydate-chip-meta{font-size:11.5px;color:var(--ink-light);font-family:'IBM Plex Mono';}
  .keydate-chip.urgent .keydate-chip-meta{color:var(--stamp);font-weight:600;}
  .keydate-chip .text-x{margin-left:auto;}

  /* ---------- heatmap ---------- */
  .heatmap-toolbar{display:flex;align-items:center;gap:10px;}
  .year-nav{display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono';font-size:13px;}
  .year-nav button{background:none;border:none;color:var(--ink-light);cursor:pointer;font-size:15px;padding:2px 6px;}
  .year-nav button:hover{color:var(--ink);}
  .heatmap-scroll{overflow-x:auto;padding-bottom:6px;}
  .heatmap-inner{display:inline-flex;gap:8px;padding-top:4px;}
  .weekday-col{display:grid;grid-template-rows:repeat(7,13px);gap:3px;padding-top:18px;}
  .weekday-col span{font-size:9.5px;color:var(--ink-light);line-height:13px;font-family:'IBM Plex Mono';}
  .heatmap-main{display:flex;flex-direction:column;}
  .month-row{display:grid;grid-auto-flow:column;gap:3px;height:16px;margin-bottom:2px;}
  .month-row span{font-size:10.5px;color:var(--ink-light);font-family:'IBM Plex Mono';white-space:nowrap;}
  .heatmap-grid{display:grid;grid-template-rows:repeat(7,13px);grid-auto-flow:column;gap:3px;}
  .cell{
    width:13px;height:13px;border-radius:50%;border:1px solid var(--border);background:var(--bubble-0);
    cursor:pointer;transition:transform .08s;
  }
  .cell:hover{transform:scale(1.35);}
  .cell.lvl-1{background:var(--bubble-1);border-color:var(--bubble-1);}
  .cell.lvl-2{background:var(--bubble-2);border-color:var(--bubble-2);}
  .cell.lvl-3{background:var(--bubble-3);border-color:var(--bubble-3);}
  .cell.lvl-4{background:var(--bubble-4);border-color:var(--bubble-4);}
  .cell.lvl-5{background:var(--bubble-5);border-color:var(--bubble-5);}
  .cell.is-today{box-shadow:0 0 0 2px var(--stamp);}
  .cell.is-future{cursor:default;border-color:transparent;background:transparent;opacity:0.35;}
  .cell.is-future:hover{transform:none;}
  .cell.is-pad{visibility:hidden;cursor:default;}

  .legend{display:flex;align-items:center;gap:5px;margin-top:14px;font-size:11.5px;color:var(--ink-light);}
  .legend .cell{cursor:default;}
  .legend .cell:hover{transform:none;}

  .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px;}
  .stat-chip{border:1px solid var(--border);border-radius:11px;padding:12px 14px;background:var(--paper);text-align:center;}
  .stat-chip .num{font-family:'IBM Plex Mono';font-size:21px;font-weight:600;color:var(--ink);}
  .stat-chip .lbl{font-size:11.5px;color:var(--ink-light);margin-top:3px;}

  /* ---------- modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(31,47,61,0.42);display:flex;align-items:center;justify-content:center;
    padding:20px;z-index:50;
  }
  .modal{
    background:var(--paper-card);border-radius:var(--radius);box-shadow:0 12px 40px rgba(0,0,0,0.18);
    width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:24px 26px;
  }
  .modal h2{font-family:'Noto Serif SC',serif;font-size:18px;margin:0 0 4px;}
  .modal .sub{font-size:12.5px;color:var(--ink-light);margin-bottom:18px;}
  .modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}
  .modal-foot .spacer{flex:1;}
  .sub-block{margin-bottom:22px;}
  .sub-block-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .sub-block-head h3{font-size:13.5px;font-weight:700;margin:0;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.04em;}
  .edit-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .edit-row input[type=text]{flex:2;}
  .edit-row input[type=date]{flex:1.4;}
  .edit-row input[type=number]{flex:0.8;}
  .edit-row input{padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:#fff;}
  .subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .subject-field label{font-size:12.5px;color:var(--ink-light);display:block;margin-bottom:4px;}
  .subject-field input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-family:'IBM Plex Mono';font-size:13.5px;}
  .danger-zone{border-top:1px dashed var(--border);margin-top:22px;padding-top:16px;}
  .danger-zone p{font-size:12px;color:var(--ink-light);margin:0 0 10px;}

  @media (max-width:560px){
    .hero{flex-direction:column;align-items:flex-start;gap:14px;}
    .hero::after{display:none;}
    .hero-meta{padding-left:0;}
    .stats-row{grid-template-columns:repeat(2,1fr);}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;}
  }

  .flash{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(8px);
    background:#1F2F3D; color:#fff; padding:10px 20px; border-radius:999px;
    font-size:13px; opacity:0; transition:opacity .25s ease, transform .25s ease;
    pointer-events:none; z-index:100; box-shadow:0 4px 18px rgba(0,0,0,0.18);
    white-space:nowrap;
  }
  .flash.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .flash.warn{ background:#B8472F; }

  .wk-grid2{
    display:grid;
    grid-template-columns: 1fr 1.2fr;
    gap: 16px;
    margin-bottom: 14px;
  }
  .wk-stats{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .wk-subjects{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .wk-subjects-title{
    font-size: 13px;
    color: var(--ink-light);
    margin-bottom: 2px;
  }
  .wk-subj-row{
    display:grid;
    grid-template-columns: 68px 1fr 88px;
    gap: 10px;
    align-items: center;
    font-size: 13px;
  }
  .wk-subj-label{ color: var(--ink); }
  .wk-subj-bar{
    height: 8px;
    background: rgba(31,47,61,0.08);
    border-radius: 4px;
    overflow: hidden;
  }
  .wk-subj-bar > div{
    height: 100%;
    background: var(--bubble-4);
    border-radius: 4px;
  }
  .wk-subj-val{
    text-align: right;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--ink-light);
    font-size: 12px;
  }
  .wk-summary-block{
    padding: 14px 16px;
    background: var(--stamp-soft);
    border: 1px dashed var(--stamp);
    border-radius: var(--radius);
    margin-bottom: 14px;
  }
  .wk-comment{ font-weight: 600; color: var(--stamp); font-size: 14px; }
  .wk-comment-extra{ font-size: 12.5px; color: var(--ink-light); margin-top: 6px; }

  .wk-daygrid{
    display:grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .wk-day{
    width: auto;
    padding: 10px 6px;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bubble-0);
    transition: transform .15s ease, box-shadow .15s ease;
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: center;
    min-height: 74px;
    justify-content: center;
  }
  .wk-day.lvl-1{background:var(--bubble-1);border-color:var(--bubble-1);}
  .wk-day.lvl-2{background:var(--bubble-2);border-color:var(--bubble-2);}
  .wk-day.lvl-3{background:var(--bubble-3);border-color:var(--bubble-3);color:#fff;}
  .wk-day.lvl-3 .wk-day-w, .wk-day.lvl-3 .wk-day-d, .wk-day.lvl-3 .wk-day-h{color:#fff;}
  .wk-day.lvl-4{background:var(--bubble-4);border-color:var(--bubble-4);color:#fff;}
  .wk-day.lvl-4 .wk-day-w, .wk-day.lvl-4 .wk-day-d, .wk-day.lvl-4 .wk-day-h{color:#fff;}
  .wk-day.lvl-5{background:var(--bubble-5);border-color:var(--bubble-5);color:#fff;}
  .wk-day.lvl-5 .wk-day-w, .wk-day.lvl-5 .wk-day-d, .wk-day.lvl-5 .wk-day-h{color:#fff;}
  .wk-day:hover{ transform: translateY(-2px); box-shadow: 0 3px 10px rgba(31,47,61,0.12); }
  .wk-day-w{ font-size: 11px; color: var(--ink-light); font-family:'IBM Plex Mono', monospace; }
  .wk-day-d{ font-size: 18px; font-weight: 700; margin: 4px 0 2px; color: var(--ink); font-family:'Noto Serif SC', serif; }
  .wk-day-h{ font-size: 11px; color: var(--ink-light); font-family:'IBM Plex Mono', monospace; }

  .wk-notes{
    border-top: 1px dashed var(--border);
    padding-top: 12px;
    margin-top: 4px;
  }
  .wk-notes-title{ font-size: 12.5px; color: var(--ink-light); margin-bottom: 8px; }
  .wk-note{
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px dashed rgba(31,47,61,0.08);
    line-height: 1.5;
  }
  .wk-note .mono{ color: var(--stamp); margin-right: 8px; }

  @media (max-width: 720px){
    .wk-grid2{ grid-template-columns: 1fr; }
    .wk-subj-row{ grid-template-columns: 56px 1fr 72px; }
  }
}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="center-screen">加载中…</div>
</div>

<script>
/* ============ constants ============ */
const SUBJECTS = [
  {key:'english', label:'英语'},
  {key:'math', label:'数学'},
  {key:'politics', label:'政治'},
  {key:'major', label:'专业课'},
  {key:'other', label:'其他'},
];
const WEEKDAY_FULL = ['日','一','二','三','四','五','六'];

/* ============ state ============ */
let config = null;          // {examDate, examLabel, milestones:[{id,title,date,progress}], keyDates:[{id,title,date}]}
let heatmap = {};           // {'YYYY-MM-DD': {subjects:{key:hours}, note:''}}
let viewYear = new Date().getFullYear();
let weekOffset = 0;
let pendingResetStep = false;
let draftConfig = null;       // working copy used while settings modal is open; discarded on cancel

/* ============ helpers ============ */
function $(sel, root){ return (root||document).querySelector(sel); }
function $all(sel, root){ return Array.from((root||document).querySelectorAll(sel)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function escapeHtml(s){
  if(s===undefined || s===null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function pad2(n){ return n<10 ? '0'+n : ''+n; }
function todayStr(){ return fmtYMD(new Date()); }
function fmtYMD(d){ return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate()); }
function parseYMD(s){
  if(!s) return null;
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function midnight(d){ return new Date(d.getFullYear(), d.getMonth(), d.getDate()); }
function daysBetween(a,b){ // b - a, in days
  return Math.round((midnight(b) - midnight(a)) / 86400000);
}
function addDays(d, n){ const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function chineseMD(s){
  const d = parseYMD(s);
  if(!d) return '';
  return (d.getMonth()+1)+'月'+d.getDate()+'日';
}
function chineseFull(s){
  const d = parseYMD(s);
  if(!d) return '';
  return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
}

/* ============ storage (localStorage + sessionStorage + memory fallback) ============ */
const LS_CONFIG_KEY = 'kaoyan.config.v1';
const LS_HEATMAP_KEY = 'kaoyan.heatmap.v1';
const memoryFallback = {config:null, heatmap:null};

function storageWrite(storage, key, value){
  try{
    if(value === null) storage.removeItem(key);
    else storage.setItem(key, value);
    return true;
  }catch(e){ return false; }
}
function storageRead(storage, key){
  try{ return storage.getItem(key); }catch(e){ return null; }
}
function storageClear(storage, key){
  try{ storage.removeItem(key); return true; }catch(e){ return false; }
}

function loadConfig(){
  for(const s of [localStorage, sessionStorage]){
    const v = storageRead(s, LS_CONFIG_KEY);
    if(v){ try{ return JSON.parse(v); }catch(e){} }
  }
  return memoryFallback.config;
}
function saveConfig(quiet){
  if(!config) return;
  const data = JSON.stringify(config);
  let ok = false;
  for(const s of [localStorage, sessionStorage]){
    if(storageWrite(s, LS_CONFIG_KEY, data)) ok = true;
  }
  memoryFallback.config = config;
  if(quiet !== true){ ok ? flash('已保存 ✓') : flash('浏览器存储受限,刷新后数据可能丢失', true); }
}
function loadHeatmap(){
  for(const s of [localStorage, sessionStorage]){
    const v = storageRead(s, LS_HEATMAP_KEY);
    if(v){ try{ return JSON.parse(v); }catch(e){} }
  }
  return memoryFallback.heatmap || {};
}
function saveHeatmap(quiet){
  const data = JSON.stringify(heatmap);
  let ok = false;
  for(const s of [localStorage, sessionStorage]){
    if(storageWrite(s, LS_HEATMAP_KEY, data)) ok = true;
  }
  memoryFallback.heatmap = heatmap;
  if(quiet !== true){ ok ? flash('已保存 ✓') : flash('浏览器存储受限,刷新后数据可能丢失', true); }
}

let _flashTimer;
function flash(msg, warn){
  let el = document.getElementById('flash-toast');
  if(!el){
    el = document.createElement('div');
    el.id = 'flash-toast';
    el.className = 'flash';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.toggle('warn', !!warn);
  el.classList.add('show');
  clearTimeout(_flashTimer);
  _flashTimer = setTimeout(()=> el.classList.remove('show'), 1800);
}

/* ============ derived data ============ */
function dayTotal(dateStr){
  const e = heatmap[dateStr];
  if(!e || !e.subjects) return 0;
  return Object.values(e.subjects).reduce((a,b)=>a+(Number(b)||0),0);
}
function levelForHours(h){
  if(h<=0) return 0;
  if(h<=2) return 1;
  if(h<=4) return 2;
  if(h<=6) return 3;
  if(h<=8) return 4;
  return 5;
}
function computeStats(){
  const dates = Object.keys(heatmap).filter(d => dayTotal(d) > 0).sort();
  const totalDays = dates.length;
  const totalHours = dates.reduce((s,d)=>s+dayTotal(d),0);
  const avg = totalDays ? (totalHours/totalDays) : 0;

  // streaks (all-time, continuous calendar days)
  let longest = 0, run = 0, prev = null;
  for(const d of dates){
    const dt = parseYMD(d);
    if(prev && daysBetween(prev, dt) === 1){ run += 1; } else { run = 1; }
    longest = Math.max(longest, run);
    prev = dt;
  }
  // current streak: walk back from today/yesterday
  let current = 0;
  let cursor = parseYMD(todayStr());
  if(dayTotal(fmtYMD(cursor)) <= 0){ cursor = addDays(cursor, -1); }
  while(dayTotal(fmtYMD(cursor)) > 0){
    current += 1;
    cursor = addDays(cursor, -1);
  }
  return {totalDays, totalHours, avg, longest, current};
}

/* ============ weekly summary ============ */
function getWeekSummary(offset){
  const today = parseYMD(todayStr());
  const dow = (today.getDay() + 6) % 7;    // Mon=0..Sun=6
  const monday = addDays(today, -dow);
  const weekStart = addDays(monday, offset * 7);
  const weekEnd = addDays(weekStart, 6);

  let totalHours = 0;
  let activeDays = 0;
  const subjHours = {};
  let best = {date:null, hours:0};
  let noteList = [];

  for(let i = 0; i < 7; i++){
    const d = addDays(weekStart, i);
    const ds = fmtYMD(d);
    const e = heatmap[ds];
    if(e){
      let daySum = 0;
      if(e.subjects){
        for(const k in e.subjects){
          const h = Number(e.subjects[k])||0;
          daySum += h;
          subjHours[k] = (subjHours[k]||0) + h;
        }
      }
      totalHours += daySum;
      if(daySum > 0){
        activeDays += 1;
        if(daySum > best.hours){ best = {date:ds, hours:daySum}; }
      }
      if(e.note && e.note.trim()) noteList.push({date:ds, note:e.note});
    }
  }

  // 与上周对比
  const last = getWeekSummaryRaw(offset - 1);
  const diff = totalHours - last.totalHours;

  let comment;
  if(activeDays === 0){ comment = '这一周还没有学习记录,下周加油!'; }
  else if(totalHours < 15){ comment = '刚起步,先把每天的学习习惯稳住。'; }
  else if(totalHours < 30){ comment = '节奏不错,继续保持这个势头。'; }
  else if(totalHours < 45){ comment = '高强度周,注意劳逸结合,别倦怠。'; }
  else { comment = '冲刺级投入量!记得安排复盘日消化内容。'; }

  let topSubject = null;
  for(const k in subjHours){
    if(!topSubject || subjHours[k] > subjHours[topSubject]) topSubject = k;
  }

  return {
    start: fmtYMD(weekStart),
    end: fmtYMD(weekEnd),
    startLabel: chineseMD(fmtYMD(weekStart)),
    endLabel: chineseMD(fmtYMD(weekEnd)),
    totalHours, activeDays,
    avgHours: activeDays ? totalHours/activeDays : 0,
    subjHours, best, topSubject, comment, noteList,
    diffHours: diff
  };
}
// 轻量版(用于计算上周对比,避免递归调用自身)
function getWeekSummaryRaw(offset){
  const today = parseYMD(todayStr());
  const dow = (today.getDay() + 6) % 7;
  const monday = addDays(today, -dow);
  const weekStart = addDays(monday, offset * 7);
  let totalHours = 0;
  for(let i = 0; i < 7; i++){
    const ds = fmtYMD(addDays(weekStart, i));
    const e = heatmap[ds];
    if(e && e.subjects){
      for(const k in e.subjects) totalHours += Number(e.subjects[k])||0;
    }
  }
  return {totalHours};
}

function renderWeeklySection(){
  const cur = getWeekSummary(weekOffset);
  const diff = cur.diffHours;
  let diffText;
  if(diff === 0) diffText = '与上周持平';
  else if(diff > 0) diffText = `比上周多 ${diff.toFixed(1)} h`;
  else diffText = `比上周少 ${Math.abs(diff).toFixed(1)} h`;

  const subjHtml = SUBJECTS.map(s => {
    const h = cur.subjHours[s.key] || 0;
    const pct = cur.totalHours ? Math.round(h*100/cur.totalHours) : 0;
    return `
      <div class="wk-subj-row">
        <span class="wk-subj-label">${s.label}</span>
        <div class="wk-subj-bar"><div style="width:${pct}%"></div></div>
        <span class="wk-subj-val">${h.toFixed(1)} h · ${pct}%</span>
      </div>`;
  }).join('');

  const s = parseYMD(cur.start);
  let dayGrid = '<div class="wk-daygrid">';
  for(let i = 0; i < 7; i++){
    const d = addDays(s, i);
    const ds = fmtYMD(d);
    const e = heatmap[ds];
    let sum = 0;
    if(e && e.subjects){
      for(const k in e.subjects) sum += Number(e.subjects[k])||0;
    }
    const lvl = levelForHours(sum);
    const weekdayShort = ['日','一','二','三','四','五','六'][d.getDay()];
    dayGrid += `
      <div class="wk-day lvl-${lvl}" data-action="open-day" data-date="${ds}" title="${chineseMD(ds)} · ${sum.toFixed(1)} h">
        <div class="wk-day-w">${weekdayShort}</div>
        <div class="wk-day-d">${d.getDate()}</div>
        <div class="wk-day-h">${sum>0 ? sum.toFixed(1)+'h' : '—'}</div>
      </div>`;
  }
  dayGrid += '</div>';

  const bestLabel = cur.best.date ? `${chineseMD(cur.best.date)} · ${cur.best.hours.toFixed(1)} h` : '—';
  const topSubjLabel = cur.topSubject
    ? (SUBJECTS.find(x=>x.key===cur.topSubject)||{}).label || cur.topSubject
    : '—';

  const notesHtml = cur.noteList.length
    ? '<div class="wk-notes"><div class="wk-notes-title">本周备注</div>' +
        cur.noteList.map(n=>`<div class="wk-note"><span class="mono">${chineseMD(n.date)}</span> ${escapeHtml(n.note)}</div>`).join('') +
        '</div>'
    : '';

  const emptyHint = cur.activeDays === 0
    ? '<div class="empty-hint">这一周还没有记录 · 点格子可以补录</div>'
    : '';

  return `
    <div class="section">
      <div class="section-head">
        <div>
          <div class="section-title">每周总结</div>
          <div class="section-caption">${cur.startLabel} ~ ${cur.endLabel} · ${diffText}</div>
        </div>
        <div class="year-nav">
          <button data-action="prev-week">‹ 上周</button>
          <button data-action="this-week">本周</button>
          <button data-action="next-week">下周 ›</button>
        </div>
      </div>

      <div class="wk-grid2">
        <div class="wk-stats">
          <div class="stat-chip"><div class="num">${cur.totalHours.toFixed(1)}</div><div class="lbl">本周总时长(h)</div></div>
          <div class="stat-chip"><div class="num">${cur.activeDays}</div><div class="lbl">打卡天数</div></div>
          <div class="stat-chip"><div class="num">${cur.avgHours.toFixed(1)}</div><div class="lbl">日均·打卡日</div></div>
          <div class="stat-chip"><div class="num">${topSubjLabel}</div><div class="lbl">最投入科目</div></div>
        </div>
        <div class="wk-subjects">
          <div class="wk-subjects-title">各科目时长占比</div>
          ${subjHtml}
        </div>
      </div>

      <div class="wk-summary-block">
        <div class="wk-comment">📌 ${cur.comment}</div>
        <div class="wk-comment-extra">最投入的一天:<span class="mono">${bestLabel}</span></div>
      </div>

      ${emptyHint}
      ${dayGrid}
      ${notesHtml}
    </div>
  `;
}

function currentMilestone(){
  if(!config.milestones || !config.milestones.length) return null;
  const today = todayStr();
  const sorted = [...config.milestones].filter(m=>m.date).sort((a,b)=> a.date.localeCompare(b.date));
  for(const m of sorted){
    if(m.date >= today) return m;
  }
  return null;
}

/* ============ init ============ */
function init(){
  config = loadConfig();
  heatmap = loadHeatmap();
  // 页面隐藏或关闭时,额外把数据刷一遍到存储
  function autosave(){
    if(config) storageWrite(localStorage, LS_CONFIG_KEY, JSON.stringify(config));
    storageWrite(localStorage, LS_HEATMAP_KEY, JSON.stringify(heatmap));
  }
  document.addEventListener('visibilitychange', () => { if(document.visibilityState==='hidden') autosave(); });
  window.addEventListener('pagehide', autosave);
  render();
}

}

function defaultExamDateGuess(){
  const now = new Date();
  let y = now.getFullYear();
  // 考研初试通常在 12 月下旬;若当前已过今年 12 月底,默认指向明年
  let guess = new Date(y, 11, 21);
  if(now > guess) guess = new Date(y+1, 11, 21);
  return fmtYMD(guess);
}

function buildYearWeeks(year){
  const jan1 = new Date(year,0,1);
  const dec31 = new Date(year,11,31);
  const start = addDays(jan1, -jan1.getDay());           // back to Sunday
  const end = addDays(dec31, 6 - dec31.getDay());         // forward to Saturday
  const weeks = [];
  let cursor = start;
  while(cursor <= end){
    const week = [];
    for(let i=0;i<7;i++){
      week.push(new Date(cursor));
      cursor = addDays(cursor,1);
    }
    weeks.push(week);
  }
  return weeks;
}

function renderMonthRow(){
  const weeks = buildYearWeeks(viewYear);
  const labels = new Array(weeks.length).fill('');
  let lastMonth = -1;
  weeks.forEach((week, i) => {
    const firstOfMonthDay = week.find(d => d.getFullYear()===viewYear && d.getDate()===1);
    if(firstOfMonthDay && firstOfMonthDay.getMonth() !== lastMonth){
      labels[i] = (firstOfMonthDay.getMonth()+1) + '月';
      lastMonth = firstOfMonthDay.getMonth();
    }
  });
  return `<div class="month-row" style="grid-template-columns:repeat(${weeks.length},13px)">
    ${labels.map(l=>`<span>${l}</span>`).join('')}
  </div>`;
}

function renderHeatmapGrid(){
  const weeks = buildYearWeeks(viewYear);
  const today = todayStr();
  let html = `<div class="heatmap-grid" style="grid-template-columns:repeat(${weeks.length},13px)">`;
  for(const week of weeks){
    for(const d of week){
      if(d.getFullYear() !== viewYear){
        html += `<div class="cell is-pad"></div>`;
        continue;
      }
      const ds = fmtYMD(d);
      if(ds > today){
        html += `<div class="cell is-future" title="${chineseMD(ds)} · 还没到"></div>`;
        continue;
      }
      const total = dayTotal(ds);
      const lvl = levelForHours(total);
      const todayCls = ds === today ? 'is-today' : '';
      const titleTxt = total>0 ? `${chineseMD(ds)} · 学习 ${total}h` : `${chineseMD(ds)} · 暂无记录`;
      html += `<div class="cell lvl-${lvl} ${todayCls}" data-action="open-day" data-date="${ds}" title="${titleTxt}"></div>`;
    }
  }
  html += `</div>`;
  return html;
}

        </div>

        <div class="danger-zone">
          <p>重置会清空全部考试信息和学习记录,且无法恢复。</p>
          ${pendingResetStep
            ? `<button class="btn btn-stamp btn-sm" data-action="confirm-reset">再次点击确认清空所有数据</button> <button class="btn btn-ghost btn-sm" data-action="cancel-reset">取消</button>`
            : `<button class="btn btn-ghost btn-sm" data-action="reset-data">重置所有数据</button>`
          }
        </div>
      </div>
    </div>
  `;
}
function renderMilestoneEditRows(){
  const list = draftConfig.milestones || [];
  if(!list.length) return `<div class="empty-hint">还没有阶段目标</div>`;
  return list.map(m => `
    <div class="edit-row" data-row-id="${m.id}">
      <input type="text" value="${escapeHtml(m.title)}" data-field="title" placeholder="阶段名称">
      <input type="date" value="${m.date||''}" data-field="date">
      <input type="number" min="0" max="100" value="${m.progress||0}" data-field="progress" placeholder="%">
      <span class="text-x" data-action="remove-milestone" data-id="${m.id}">✕</span>
    </div>
  `).join('');
}
function renderKeyDateEditRows(){
  const list = draftConfig.keyDates || [];
  if(!list.length) return `<div class="empty-hint">还没有关键节点</div>`;
  return list.map(k => `
    <div class="edit-row" data-row-id="${k.id}">
      <input type="text" value="${escapeHtml(k.title)}" data-field="title" placeholder="节点名称">
      <input type="date" value="${k.date||''}" data-field="date">
      <span class="text-x" data-action="remove-keydate" data-id="${k.id}">✕</span>
    </div>
  `).join('');
}

/* ============ modal mount/unmount ============ */
function openModal(html){
  closeModal();
  const div = document.createElement('div');
  div.id = 'modal-root';
  div.innerHTML = html;
  document.body.appendChild(div);
}
function closeModal(){
  const existing = document.getElementById('modal-root');
  if(existing) existing.remove();
  pendingResetStep = false;
}

/* ============ events ============ */
function bindEvents(){
  document.body.removeEventListener('click', handleClick);
  document.body.addEventListener('click', handleClick);
}

function handleClick(e){
  const overlay = e.target.closest('[data-action="overlay-close"]');
  if(overlay && e.target === overlay){ closeModal(); draftConfig = null; return; }

  const el = e.target.closest('[data-action]');
  if(!el) return;
  const action = el.dataset.action;

  if(action === 'setup-submit'){
    const date = $('#setup-date').value;
    if(!date) return;
    config = {
      examDate: date,
      examLabel: $('#setup-label').value.trim(),
      milestones: [],
      keyDates: []
    };
    saveConfig();
    render();
    return;
  }

  if(action === 'open-settings'){
    draftConfig = JSON.parse(JSON.stringify(config));
    openModal(renderSettingsModal());
    return;
  }
  if(action === 'close-modal'){ closeModal(); draftConfig = null; return; }

  if(action === 'add-milestone'){
    draftConfig.milestones = draftConfig.milestones || [];
    draftConfig.milestones.push({id:uid(), title:'新阶段', date:'', progress:0});
    $('#milestone-rows').innerHTML = renderMilestoneEditRows();
    return;
  }
  if(action === 'remove-milestone'){
    draftConfig.milestones = (draftConfig.milestones||[]).filter(m=>m.id !== el.dataset.id);
    $('#milestone-rows').innerHTML = renderMilestoneEditRows();
    return;
  }
  if(action === 'add-keydate'){
    draftConfig.keyDates = draftConfig.keyDates || [];
    draftConfig.keyDates.push({id:uid(), title:'新节点', date:''});
    $('#keydate-rows').innerHTML = renderKeyDateEditRows();
    return;
  }
  if(action === 'remove-keydate'){
    draftConfig.keyDates = (draftConfig.keyDates||[]).filter(k=>k.id !== el.dataset.id);
    $('#keydate-rows').innerHTML = renderKeyDateEditRows();
    return;
  }

  if(action === 'save-settings'){
    draftConfig.examDate = $('#set-exam-date').value || draftConfig.examDate;
    draftConfig.examLabel = $('#set-exam-label').value.trim();
    $all('#milestone-rows .edit-row').forEach(row=>{
      const id = row.dataset.rowId;
      const m = (draftConfig.milestones||[]).find(x=>x.id===id);
      if(m){
        m.title = row.querySelector('[data-field="title"]').value.trim() || '未命名阶段';
        m.date = row.querySelector('[data-field="date"]').value;
        m.progress = Math.max(0, Math.min(100, Number(row.querySelector('[data-field="progress"]').value)||0));
      }
    });
    $all('#keydate-rows .edit-row').forEach(row=>{
      const id = row.dataset.rowId;
      const k = (draftConfig.keyDates||[]).find(x=>x.id===id);
      if(k){
        k.title = row.querySelector('[data-field="title"]').value.trim() || '未命名节点';
        k.date = row.querySelector('[data-field="date"]').value;
      }
    });
    config = draftConfig;
    saveConfig();
    closeModal();
    render();
    return;
  }

  if(action === 'reset-data'){
    pendingResetStep = true;
    openModal(renderSettingsModal());
    return;
  }
  if(action === 'cancel-reset'){
    pendingResetStep = false;
    openModal(renderSettingsModal());
    return;
  }
  if(action === 'confirm-reset'){
    for(const s of [localStorage, sessionStorage]){ storageClear(s, LS_CONFIG_KEY); storageClear(s, LS_HEATMAP_KEY); }
    config = null; heatmap = {}; pendingResetStep = false;
    closeModal();
    render();
    flash('已清空全部数据');
    return;
  }

  if(action === 'export-data'){
    const payload = {
      version:1, exportedAt: new Date().toISOString(),
      config: config || null,
      heatmap: heatmap || {}
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `kaoyan-backup-${todayStr()}.json`;
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 100);
    flash('已导出到下载目录');
    return;
  }
  if(action === 'import-data'){
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json,.json';
    input.onchange = (ev) => {
      const file = ev.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try{
          const data = JSON.parse(e.target.result);
          if(!data || typeof data !== 'object') throw new Error('格式不正确');
          if(data.config) config = data.config;
          if(data.heatmap && typeof data.heatmap === 'object') heatmap = data.heatmap;
          saveConfig(true); saveHeatmap(true);
          closeModal();
          render();
          flash('导入成功 ✓');
        }catch(err){
          flash('导入失败:' + err.message, true);
        }
      };
      reader.onerror = () => flash('读取文件失败', true);
      reader.readAsText(file);
    };
    input.click();
    return;
  }

  if(action === 'prev-year'){ viewYear -= 1; render(); return; }
  if(action === 'next-year'){ viewYear += 1; render(); return; }

  if(action === 'prev-week'){ weekOffset -= 1; render(); return; }
  if(action === 'next-week'){ weekOffset += 1; render(); return; }
  if(action === 'this-week'){ weekOffset = 0; render(); return; }

  if(action === 'log-today'){ openModal(renderDayModal(todayStr())); return; }
  if(action === 'open-day'){ openModal(renderDayModal(el.dataset.date)); return; }

  if(action === 'save-day'){
    const date = el.dataset.date;
    const subjects = {};
    SUBJECTS.forEach(s=>{
      const v = parseFloat($('#day-'+s.key).value);
      if(v && v>0) subjects[s.key] = v;
    });
    const note = $('#day-note').value.trim();
    if(Object.keys(subjects).length===0 && !note){
      delete heatmap[date];
    } else {
      heatmap[date] = {subjects, note};
    }
    saveHeatmap();
    closeModal();
    render();
    return;
  }
  if(action === 'clear-day'){
    const date = el.dataset.date;
    delete heatmap[date];
    saveHeatmap();
    closeModal();
    render();
    return;
  }
}

init();
</script>
</body>
</html>
